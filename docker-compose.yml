services:
  db:
    image: postgres:15-alpine
    container_name: tasksphere-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tasksphere_secure_pass_2026
      POSTGRES_DB: tasksphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasksphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tasksphere-web
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_USER: postgres
      DB_PASSWORD: tasksphere_secure_pass_2026
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasksphere
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
